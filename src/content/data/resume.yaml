- pageTitle: Resume
  summary: UX manager, researcher, and design systems engineer with more than two decades of experience across government, nonprofits, education, healthcare, and civic technology.

  experience:
    - company: Avidano Digital
      title: Owner/Principal
      dates: March 2011 — Present
      description:
        - Created and maintain Natura11y, an accessibility-first design system with reusable patterns, documentation, Figma UI kits, and front-end components.
        - "Rebranded and redesigned Visionlearning's bilingual STEM education platform, improving accessibility and engagement across 100+ learning modules. Created interactive components, quizzes, audio, and glossary tools aligned with Next Generation Science Standards."
        - Led website redesign for Cheetah Conservation Fund, creating a custom WordPress multisite platform to enable regional chapters to manage independent websites. Achieved 59% increase in donation page traffic and 38% growth in online campaign revenue while improving mobile user experience.
        - Redesigned and built Mr. Ellie Pooh's e-commerce site using a custom Shopify theme and original photography of 1,000+ products, achieving 10× increase in online sales.
        - Designed UNICEF's Funding Marketplace, a prescriptive CMS enabling 80+ country offices to manage fundraising campaigns more effectively. Led interaction design, front-end development, and complex userflows, resulting in significant increase in global fundraising efficiency. The platform supported over $300 million in revenue from 2010–2016.

    - company: Reingold
      title: UX Director
      dates: March 2022 — May 2025
      description:
        - Managed and mentored UX designers through regular check-ins, project direction, design critiques, performance feedback, and career development support.
        - Led comprehensive UX strategy and information architecture redesign for Phoenix.gov, serving 1.5+ million residents as America's fifth-largest city. Conducted stakeholder interviews, tree testing with 100+ residents, and peer analysis to simplify access to city services.
        - Led UX and design strategy for global medical platform connecting doctors worldwide to improve pediatric cancer care. Facilitated stakeholder workshops and delivered wireframes and high-fidelity designs in Figma.
        - Co-led fast-turnaround design system pilot for State of Nebraska, building custom USWDS components in Figma for Adobe Experience Manager (AEM) rollout. Collaborated directly with government stakeholders to align reusable patterns with implementation needs.
        - Led user research for Legal Aid Disaster Resource Center, conducting interviews, remote usability testing, and tree testing to improve how legal aid attorneys nationwide access disaster law resources for low-income survivors.

    - company: NYC Office of Technology & Innovation (OTI)
      title: Senior UX Designer
      dates: Sept 2017 — March 2022
      description:
        - Designed the UI and developed the front-end for NYC Poletop Manager, a GIS mapping application used to track and manage 5G and smart city infrastructure on utility poles across all five boroughs.
        - Designed and developed front-end for Materials for the Arts (MFTA) donation management system, streamlining manual workflows for warehouse staff and volunteers.
        - Redesigned the Notify NYC website and custom admin portal for citywide emergency alert publishing.
        - Oversaw the UX strategy for the NYC311 mobile app (iOS and Android) redesign.

